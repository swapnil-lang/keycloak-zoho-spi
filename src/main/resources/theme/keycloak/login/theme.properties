# Zoho Social Identity Provider — Theme Extension
#
# This file extends the built-in Keycloak login theme to add the Zoho
# social login button icon. It uses the standard kcLogoIdP-{providerId}
# mechanism that Keycloak's login template uses to render provider icons.
#
# IMPORTANT for users with custom themes:
# If you have a custom login theme, copy the following line into your own
# theme.properties file (update the path to match your theme structure):
#
#   kcLogoIdP-zoho=zoho-idp-icon
#
# And copy zoho-idp.css and zoho-logo.svg into your theme's resources directory.

parent=keycloak
import=common/keycloak

# Maps the "zoho" provider ID to the CSS class used in the login button icon.
# The value must match a CSS class defined in zoho-idp.css.
kcLogoIdP-zoho=zoho-idp-icon

# Include the Zoho icon stylesheet alongside the base theme stylesheets.
styles=css/login.css css/zoho-idp.css
